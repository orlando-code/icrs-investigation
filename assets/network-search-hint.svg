<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img" aria-labelledby="network-hint-svg-title">
  <title id="network-hint-svg-title">Searching the co-authorship network for bleaching highlights matching speakers and their links</title>
  <defs>
    <linearGradient id="panel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f8fa"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0e3d4f" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="640" height="320" rx="16" fill="#edf2f5"/>
  <rect x="16" y="16" width="188" height="288" rx="14" fill="url(#panel-bg)" stroke="#d8e2e8" filter="url(#shadow)"/>
  <text x="32" y="44" fill="#5a6b78" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.06em">SEARCH NETWORK</text>
  <rect x="32" y="58" width="156" height="34" rx="10" fill="#ffffff" stroke="#1f6f8b" stroke-width="2"/>
  <text x="44" y="80" fill="#14212b" font-family="system-ui, sans-serif" font-size="15" font-weight="600">bleaching</text>
  <rect x="32" y="104" width="72" height="28" rx="999" fill="#1f6f8b"/>
  <text x="68" y="122" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Search</text>
  <text x="32" y="156" fill="#5a6b78" font-family="system-ui, sans-serif" font-size="11">12 nodes matched</text>
  <text x="32" y="174" fill="#5a6b78" font-family="system-ui, sans-serif" font-size="11">(matches + co-authors)</text>
  <rect x="32" y="196" width="156" height="44" rx="10" fill="#f7fbfd" stroke="#d8e2e8"/>
  <circle cx="48" cy="218" r="8" fill="#1f6f8b"/>
  <text x="64" y="214" fill="#14212b" font-family="system-ui, sans-serif" font-size="12" font-weight="600">A. Rogers</text>
  <text x="64" y="230" fill="#5a6b78" font-family="system-ui, sans-serif" font-size="10">talk mentions bleaching</text>
  <rect x="220" y="16" width="404" height="288" rx="14" fill="#ffffff" stroke="#d8e2e8" filter="url(#shadow)"/>
  <g stroke="#d8e2e8" stroke-width="2" fill="none" opacity="0.9">
    <line x1="360" y1="120" x2="430" y2="90"/>
    <line x1="360" y1="120" x2="320" y2="180"/>
    <line x1="430" y1="90" x2="500" y2="110"/>
    <line x1="320" y1="180" x2="390" y2="210"/>
    <line x1="390" y1="210" x2="470" y2="190"/>
    <line x1="500" y1="110" x2="540" y2="170"/>
    <line x1="280" y1="130" x2="360" y2="120"/>
    <line x1="280" y1="130" x2="250" y2="210"/>
    <line x1="250" y1="210" x2="320" y2="180"/>
    <line x1="540" y1="170" x2="470" y2="190"/>
    <line x1="560" y1="240" x2="470" y2="190"/>
    <line x1="560" y1="240" x2="540" y2="170"/>
  </g>
  <g stroke="#1f6f8b" stroke-width="2.5" fill="none" opacity="0.85">
    <line x1="360" y1="120" x2="430" y2="90"/>
    <line x1="360" y1="120" x2="320" y2="180"/>
    <line x1="430" y1="90" x2="500" y2="110"/>
    <line x1="320" y1="180" x2="390" y2="210"/>
    <line x1="280" y1="130" x2="360" y2="120"/>
    <line x1="280" y1="130" x2="250" y2="210"/>
    <line x1="250" y1="210" x2="320" y2="180"/>
  </g>
  <g>
    <circle cx="560" cy="240" r="11" fill="#e8edf0" stroke="#c5d0d8" stroke-width="2"/>
    <circle cx="540" cy="170" r="11" fill="#e8edf0" stroke="#c5d0d8" stroke-width="2"/>
    <circle cx="500" cy="110" r="11" fill="#e8edf0" stroke="#c5d0d8" stroke-width="2"/>
    <circle cx="470" cy="190" r="11" fill="#e8edf0" stroke="#c5d0d8" stroke-width="2"/>
    <circle cx="280" cy="130" r="13" fill="#d95f02" stroke="#ffffff" stroke-width="2"/>
    <circle cx="360" cy="120" r="15" fill="#1f6f8b" stroke="#ffffff" stroke-width="2"/>
    <circle cx="430" cy="90" r="14" fill="#1f6f8b" stroke="#ffffff" stroke-width="2"/>
    <circle cx="320" cy="180" r="13" fill="#1f6f8b" stroke="#ffffff" stroke-width="2"/>
    <circle cx="390" cy="210" r="12" fill="#1f6f8b" stroke="#ffffff" stroke-width="2"/>
    <circle cx="250" cy="210" r="11" fill="#d95f02" stroke="#ffffff" stroke-width="2"/>
  </g>
  <rect x="248" y="252" width="164" height="24" rx="8" fill="#f7dcc8"/>
  <text x="330" y="268" fill="#8a3d00" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">matched + linked co-authors</text>
</svg>
